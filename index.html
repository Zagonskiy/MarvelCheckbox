<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARVEL Tracker: Multiplayer</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Roboto:wght@400;500&display=swap');

        :root {
            --marvel-red: #EC1D24;
            --bg-dark: #151515;
            --panel-bg: #222222;
            --text-main: #FFFFFF;
            --text-muted: #888888;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
            background-image: radial-gradient(circle at top center, #2a2a2a 0%, #151515 70%);
        }

        /* --- Авторизация --- */
        #authOverlay {
            position: fixed;
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .auth-box {
            background: var(--panel-bg);
            padding: 40px;
            border-radius: 8px;
            border: 2px solid var(--marvel-red);
            text-align: center;
            width: 100%;
            max-width: 400px;
        }

        .auth-box h2 { 
            font-family: 'Oswald', sans-serif; 
            text-transform: uppercase; 
            margin-bottom: 20px; 
            font-size: 2rem; 
        }
        
        .auth-box input[type="text"] { 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 15px; 
            background: #111; 
            color: white; 
            border: 1px solid #444; 
            border-radius: 4px; 
        }
        
        .auth-box input[type="color"] { 
            width: 100%; 
            height: 50px; 
            border: none; 
            background: transparent; 
            cursor: pointer; 
            margin-bottom: 20px; 
        }
        
        .auth-box button { 
            width: 100%; 
            background: var(--marvel-red); 
            color: white; 
            border: none; 
            padding: 15px; 
            font-family: 'Oswald', sans-serif; 
            font-size: 1.2rem; 
            cursor: pointer; 
            text-transform: uppercase; 
            border-radius: 4px; 
        }

        .delete-btn {
            background: transparent;
            border: none;
            color: #555;
            font-size: 1.2rem;
            cursor: pointer;
            transition: color 0.2s, transform 0.1s;
            margin-left: auto;
        }

        .delete-btn:hover {
            color: var(--marvel-red);
            transform: scale(1.1);
        }

        /* --- Основной интерфейс --- */
        #app { 
            display: none; 
            width: 100%; 
            max-width: 1000px; 
        }

        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .logo {
            font-family: 'Oswald', sans-serif;
            background-color: var(--marvel-red);
            color: var(--text-main);
            font-size: 3rem;
            font-weight: 700;
            text-transform: uppercase;
            padding: 5px 20px;
            line-height: 1;
            box-shadow: 0 5px 20px rgba(236, 29, 36, 0.4);
        }

        .user-info { 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            font-weight: 500; 
        }
        
        .user-color-indicator { 
            width: 20px; 
            height: 20px; 
            border-radius: 50%; 
            border: 2px solid #fff; 
        }

        .container {
            background: var(--panel-bg);
            border-radius: 8px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            overflow: hidden;
            border: 1px solid #333;
        }

        .controls {
            display: flex;
            padding: 20px;
            gap: 15px;
            background: #1a1a1a;
            border-bottom: 3px solid var(--marvel-red);
            flex-wrap: wrap;
            align-items: center;
        }

        .controls input, .controls select {
            padding: 12px;
            border: 2px solid #333;
            border-radius: 4px;
            background: #111;
            color: white;
            font-size: 1.1rem;
            outline: none;
        }

        #movieInput { flex: 1 1 250px; }
        #seasonInput { flex: 0 1 100px; text-align: center; }
        #phaseSelect { flex: 0 1 120px; }

        .controls button {
            background-color: var(--marvel-red);
            color: white;
            border: none;
            padding: 12px 25px;
            font-family: 'Oswald', sans-serif;
            font-size: 1.2rem;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 4px;
            transition: 0.2s;
        }

        .controls button:hover { 
            background-color: #ff2a31; 
        }

        /* --- Таблица --- */
        .table-wrapper { 
            max-height: 65vh; 
            overflow-y: auto; 
        }
        
        .table-wrapper::-webkit-scrollbar { 
            width: 8px; 
        }
        
        .table-wrapper::-webkit-scrollbar-thumb { 
            background: var(--marvel-red); 
            border-radius: 4px; 
        }

        .movie-table { 
            width: 100%; 
            border-collapse: collapse; 
        }
        
        .movie-table th { 
            background: #111; 
            color: var(--text-muted); 
            padding: 15px; 
            text-align: left; 
            position: sticky; 
            top: 0; 
            z-index: 10; 
            font-family: 'Oswald', sans-serif; 
            text-transform: uppercase; 
        }
        
        .movie-table td { 
            padding: 15px; 
            border-bottom: 1px solid #2a2a2a; 
            vertical-align: middle; 
        }
        
        .movie-table tr:hover td { 
            background: rgba(255,255,255,0.02); 
        }

        .phase-header { 
            background: #1a1a1a; 
            font-family: 'Oswald', sans-serif; 
            color: var(--marvel-red); 
            font-size: 1.2rem; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            border-bottom: 2px solid #333 !important; 
        }

        /* --- Чекбоксы и точки --- */
        .progress-cell { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            gap: 20px; 
        }
        
        .checkbox-group { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 10px; 
            align-items: center; 
        }
        
        .season-item { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 4px; 
        }
        
        .season-label { 
            font-size: 0.7rem; 
            color: var(--text-muted); 
            font-weight: bold; 
        }
        
        .checkbox-container { 
            position: relative; 
            cursor: pointer; 
            width: 24px; 
            height: 24px; 
        }
        
        .checkbox-container input { 
            position: absolute; 
            opacity: 0; 
            width: 0; 
            height: 0; 
        }
        
        .checkmark { 
            position: absolute; 
            top: 0; 
            left: 0; 
            height: 24px; 
            width: 24px; 
            background-color: #111; 
            border-radius: 4px; 
            border: 2px solid #555; 
            transition: 0.2s; 
        }
        
        .checkbox-container:hover input ~ .checkmark { 
            border-color: var(--marvel-red); 
        }
        
        .checkbox-container input:checked ~ .checkmark { 
            background-color: var(--marvel-red); 
            border-color: var(--marvel-red); 
        }
        
        .checkmark:after { 
            content: ""; 
            position: absolute; 
            display: none; 
            left: 7px; 
            top: 3px; 
            width: 5px; 
            height: 10px; 
            border: solid white; 
            border-width: 0 2px 2px 0; 
            transform: rotate(45deg); 
        }
        
        .checkbox-container input:checked ~ .checkmark:after { 
            display: block; 
        }

        /* Контейнер для точек других пользователей */
        .dots-container { 
            display: flex; 
            gap: 5px; 
            flex-wrap: wrap; 
            max-width: 150px; 
            justify-content: flex-end; 
        }
        
        .user-dot { 
            width: 12px; 
            height: 12px; 
            border-radius: 50%; 
            border: 1px solid rgba(255,255,255,0.2); 
            box-shadow: 0 0 5px rgba(0,0,0,0.5); 
        }

        .unreleased-tag { 
            color: var(--marvel-red); 
            font-size: 0.7rem; 
            border: 1px solid var(--marvel-red); 
            padding: 2px 6px; 
            border-radius: 3px; 
            margin-left: 10px; 
            text-transform: uppercase; 
        }
        
        .movie-title { 
            font-size: 1.1rem; 
            font-weight: 500; 
        }
        
        .all-watched { 
            color: var(--text-muted); 
            text-decoration: line-through; 
        }

        /* --- Новые стили для Модалки, Палитры и Прогресс-баров --- */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; z-index: 2000; }
        
        .color-grid { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 20px; }
        .color-circle { width: 40px; height: 40px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: 0.2s; }
        .color-circle.selected { border-color: white; transform: scale(1.1); box-shadow: 0 0 10px rgba(255,255,255,0.5); }
        .color-circle.disabled { opacity: 0.2; cursor: not-allowed; border-color: #000; }

        .progress-container { background: #1a1a1a; padding: 15px 20px; border-bottom: 3px solid var(--marvel-red); }
        .user-progress { margin-bottom: 10px; }
        .user-progress:last-child { margin-bottom: 0; }
        .progress-info { display: flex; justify-content: space-between; font-size: 0.85rem; font-weight: bold; margin-bottom: 5px; text-transform: uppercase; }
        .progress-bar-bg { width: 100%; height: 12px; background: #333; border-radius: 6px; overflow: hidden; }
        .progress-bar-fill { height: 100%; transition: width 0.4s ease-out; }
        
    </style>
</head>
<body>

    <div id="authOverlay">
        <div class="auth-box">
            <h2>Регистрация Агента</h2>
            <input type="text" id="usernameInput" placeholder="Введите позывной (никнейм)..." autocomplete="off">
            <label style="display:block; text-align:left; margin-bottom:10px; color:#888; font-size:0.9rem;">Выберите свободный цвет:</label>
            <div id="colorGrid" class="color-grid"></div>
            <button id="loginBtn">Войти в систему</button>
        </div>
    </div>

    <div id="app">
        <div class="header-bar">
            <div class="logo">MARVEL</div>
            <div class="user-info">
                <span id="displayUsername"></span>
                <div id="displayColor" class="user-color-indicator"></div>
                <button onclick="logout()" style="background:transparent; border:1px solid #555; color:#888; padding:5px 10px; border-radius:4px; cursor:pointer; margin-left:10px;">Выйти</button>
            </div>
        </div>

        <div class="container">
            <div id="progressContainer" class="progress-container"></div>

            <div class="controls" style="justify-content: space-between;">
                <input type="text" id="searchInput" placeholder="🔍 Поиск проекта (введите название)..." style="flex: 1;">
                <button id="openModalBtn" style="flex: 0 0 auto; width: 50px; font-size: 1.5rem; padding: 10px;">+</button>
            </div>

            <div id="addModal" class="modal-overlay" style="display: none;">
                <div class="auth-box">
                    <h2 style="font-size: 1.5rem;">Добавить проект</h2>
                    <input type="text" id="movieInput" placeholder="Название (* если не вышел)">
                    <input type="number" id="seasonInput" min="1" placeholder="Кол-во сезонов (по ум. 1)">
                    <select id="phaseSelect" style="width:100%; padding:12px; margin-bottom:20px; background:#111; color:white; border:1px solid #444; border-radius:4px;">
                        <option value="0">Вне фаз</option>
                        <option value="1">Фаза 1</option>
                        <option value="2">Фаза 2</option>
                        <option value="3">Фаза 3</option>
                        <option value="4">Фаза 4</option>
                        <option value="5">Фаза 5</option>
                        <option value="6">Фаза 6</option>
                        <option value="7">Фаза 7</option>
                        <option value="8">Фаза 8</option>
                        <option value="9">Мультфильмы</option>
                        <option value="10">Прочее</option>
                    </select>
                    <button id="addBtn">Добавить в базу</button>
                    <button id="closeModalBtn" style="background:transparent; color:#888; border:1px solid #555; margin-top:10px;">Отмена</button>
                </div>
            </div>

            <div class="table-wrapper">
                <table class="movie-table">
                    <thead>
                        <tr>
                            <th style="width: 50%;">Проект</th>
                            <th>Прогресс (Личный) / Посмотрели (Глобально)</th>
                        </tr>
                    </thead>
                    <tbody id="movieTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // ==========================================
        // ВАЖНО: Тебе нужно вставить сюда ключи 
        // из настроек твоего проекта в Firebase Console
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyB6L_Ij_KR5_Op9gh6ohvKcWVpWVrbDxq8",
            authDomain: "marvelcheckbox.firebaseapp.com",
            projectId: "marvelcheckbox",
            storageBucket: "marvelcheckbox.firebasestorage.app",
            messagingSenderId: "763406735116",
            appId: "1:763406735116:web:4614d9095c293072175b29",
            measurementId: "G-7ZTR6VTHEN"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const moviesCol = collection(db, "marvel_projects");

        // Локальное состояние
        let currentUser = JSON.parse(localStorage.getItem('marvelAgent'));
        let globalMovies = [];
        let searchTerm = ""; // Глобальный поиск

        // 8 Базовых цветов
        const BASE_COLORS = ['#EC1D24', '#0078D7', '#107C10', '#FFB900', '#881798', '#00B294', '#FF8C00', '#E81123'];
        let selectedColor = BASE_COLORS[0];

        const authOverlay = document.getElementById('authOverlay');
        const appContainer = document.getElementById('app');
        const tbody = document.getElementById('movieTableBody');

        // Слушаем базу данных ВСЕГДА (даже до логина, чтобы знать занятые цвета)
        onSnapshot(moviesCol, (snapshot) => {
            globalMovies = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderColorGrid(); // Обновляем палитру
            if (currentUser) {
                renderTable();
                renderProgressBars();
            }
        });

        // Отрисовка палитры 8 цветов
        function renderColorGrid() {
            const grid = document.getElementById('colorGrid');
            if(!grid) return;
            grid.innerHTML = '';
            
            // Собираем занятые цвета из базы
            const takenColors = new Set();
            globalMovies.forEach(m => {
                if(m.users) Object.values(m.users).forEach(u => takenColors.add(u.color.toUpperCase()));
            });

            BASE_COLORS.forEach(color => {
                const circle = document.createElement('div');
                circle.className = 'color-circle';
                circle.style.backgroundColor = color;
                
                const isTaken = takenColors.has(color.toUpperCase());
                // Если цвет занят и это не мой текущий цвет - блокируем
                if (isTaken && (!currentUser || currentUser.color.toUpperCase() !== color.toUpperCase())) {
                    circle.classList.add('disabled');
                    circle.title = "Цвет уже занят другим агентом";
                } else {
                    if (selectedColor === color) circle.classList.add('selected');
                    circle.addEventListener('click', () => {
                        selectedColor = color;
                        renderColorGrid();
                    });
                }
                grid.appendChild(circle);
            });
        }

        if (currentUser) {
            initApp();
        } else {
            renderColorGrid();
        }

        document.getElementById('loginBtn').addEventListener('click', () => {
            const name = document.getElementById('usernameInput').value.trim();
            if (!name) return alert('Введите позывной!');
            // Проверка: вдруг он умудрился кликнуть заблокированный цвет
            const circle = document.querySelector('.color-circle.selected');
            if(circle && circle.classList.contains('disabled')) return alert('Цвет занят!');
            
            currentUser = { name, color: selectedColor };
            localStorage.setItem('marvelAgent', JSON.stringify(currentUser));
            initApp();
        });

        function initApp() {
            authOverlay.style.display = 'none';
            appContainer.style.display = 'block';
            document.getElementById('displayUsername').innerText = currentUser.name;
            document.getElementById('displayColor').style.backgroundColor = currentUser.color;
            renderTable();
            renderProgressBars();
        }

        // ИСПРАВЛЕНО: Ключи теперь совпадают со значениями (value) из HTML (<option value="9"> и <option value="10">)
        const categoryNames = {
            "0": "Вне фаз / Другие вселенные",
            "1": "Фаза 1",
            "2": "Фаза 2",
            "3": "Фаза 3",
            "4": "Фаза 4",
            "5": "Фаза 5",
            "6": "Фаза 6",
            "7": "Фаза 7",
            "8": "Фаза 8",
            "9": "Мультфильмы", 
            "10": "Прочее"        
        };

        // --- Логика Модалки и Поиска ---
        document.getElementById('openModalBtn').addEventListener('click', () => document.getElementById('addModal').style.display = 'flex');
        document.getElementById('closeModalBtn').addEventListener('click', () => document.getElementById('addModal').style.display = 'none');
        
        document.getElementById('searchInput').addEventListener('input', (e) => {
            searchTerm = e.target.value.toLowerCase();
            renderTable(); // Перерисовываем таблицу при вводе
        });

        // --- Логика Прогресс-баров ---
        function renderProgressBars() {
            const container = document.getElementById('progressContainer');
            container.innerHTML = '';
            
            let totalSeasons = 0;
            const userStats = {}; // { Имя: {color, watched} }

            globalMovies.forEach(m => {
                totalSeasons += m.seasons;
                const users = m.users || {};
                Object.entries(users).forEach(([name, data]) => {
                    if (!userStats[name]) userStats[name] = { color: data.color, watched: 0 };
                    // Считаем сколько галочек true поставил человек
                    userStats[name].watched += data.watched.filter(v => v === true).length;
                });
            });

            if (totalSeasons === 0) return;

            // Рисуем бары для каждого пользователя
            Object.entries(userStats).forEach(([name, stats]) => {
                const percent = (stats.watched / totalSeasons) * 100;
                container.innerHTML += `
                    <div class="user-progress">
                        <div class="progress-info">
                            <span style="color: ${stats.color}">${name}</span>
                            <span>${stats.watched} / ${totalSeasons} Эпизодов (${percent.toFixed(1)}%)</span>
                        </div>
                        <div class="progress-bar-bg">
                            <div class="progress-bar-fill" style="width: ${percent}%; background-color: ${stats.color};"></div>
                        </div>
                    </div>
                `;
            });
        }

        // --- Обновленный renderTable с поддержкой поиска ---
        function renderTable() {
            tbody.innerHTML = '';
            const grouped = {};

            globalMovies.forEach(m => {
                const phase = m.phase || "0"; 
                if (!grouped[phase]) grouped[phase] = [];
                grouped[phase].push(m);
            });

            const existingCategories = Object.keys(grouped).sort((a, b) => {
                const numA = parseInt(a);
                const numB = parseInt(b);
                if (!isNaN(numA) && !isNaN(numB)) return numA - numB;
                if (!isNaN(numA)) return -1; 
                if (!isNaN(numB)) return 1;
                return a.localeCompare(b);
            });

            existingCategories.forEach(catKey => {
                // Фильтруем фильмы по строке поиска
                const filteredMovies = grouped[catKey].filter(movie => 
                    movie.title.toLowerCase().includes(searchTerm)
                );

                // Если в категории после поиска не осталось фильмов - пропускаем ее
                if (filteredMovies.length === 0) return;

                filteredMovies.sort((a, b) => a.title.localeCompare(b.title, 'ru'));

                const phaseTr = document.createElement('tr');
                const phaseName = categoryNames[catKey] || `Категория: ${catKey}`;
                phaseTr.innerHTML = `<td colspan="2" class="phase-header">${phaseName}</td>`;
                tbody.appendChild(phaseTr);

                filteredMovies.forEach(movie => {
                    const tr = document.createElement('tr');
                    const usersData = movie.users || {};
                    const myData = usersData[currentUser.name] || { watched: new Array(movie.seasons).fill(false) };
                    const isFullyWatchedByMe = myData.watched.every(s => s === true);

                    let progressHtml = `<div class="checkbox-group">`;
                    for (let s = 0; s < movie.seasons; s++) {
                        const isWatched = myData.watched[s] || false;
                        const label = movie.seasons > 1 ? `<span class="season-label">S${s+1}</span>` : '';
                        progressHtml += `
                            <div class="season-item">
                                ${label}
                                <label class="checkbox-container">
                                    <input type="checkbox" ${isWatched ? 'checked' : ''} 
                                           data-movie-id="${movie.id}" data-season-idx="${s}">
                                    <span class="checkmark"></span>
                                </label>
                            </div>
                        `;
                    }
                    progressHtml += `</div>`;

                    let dotsHtml = `<div class="dots-container">`;
                    Object.entries(usersData).forEach(([username, data]) => {
                        if (data.watched && data.watched.length === movie.seasons && data.watched.every(v => v === true)) {
                            dotsHtml += `<div class="user-dot" style="background-color: ${data.color};" title="Посмотрел: ${username}"></div>`;
                        }
                    });
                    dotsHtml += `</div>`;

                    const unreleasedHtml = movie.unreleased ? `<span class="unreleased-tag">Ожидается</span>` : '';

                    tr.innerHTML = `
                        <td>
                            <span class="movie-title ${isFullyWatchedByMe ? 'all-watched' : ''}">${movie.title}</span>
                            ${unreleasedHtml}
                        </td>
                        <td>
                            <div class="progress-cell">
                                ${progressHtml}
                                ${dotsHtml}
                                <button class="delete-btn" onclick="deleteProject('${movie.id}')" title="Удалить">🗑️</button>
                            </div>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            });

            document.querySelectorAll('.checkbox-container input').forEach(checkbox => {
                checkbox.addEventListener('change', handleCheckboxChange);
            });
        }

        async function handleCheckboxChange(e) {
            const movieId = e.target.getAttribute('data-movie-id');
            const seasonIdx = parseInt(e.target.getAttribute('data-season-idx'));
            const isChecked = e.target.checked;

            const movie = globalMovies.find(m => m.id === movieId);
            if (!movie) return;

            let usersData = movie.users || {};
            if (!usersData[currentUser.name]) {
                usersData[currentUser.name] = {
                    color: currentUser.color,
                    watched: new Array(movie.seasons).fill(false)
                };
            }
            
            usersData[currentUser.name].color = currentUser.color;
            usersData[currentUser.name].watched[seasonIdx] = isChecked;

            const movieRef = doc(db, "marvel_projects", movieId);
            await updateDoc(movieRef, { users: usersData });
        }

        document.getElementById('addBtn').addEventListener('click', async () => {
            const titleInput = document.getElementById('movieInput');
            const seasonInput = document.getElementById('seasonInput');
            const phaseSelect = document.getElementById('phaseSelect');

            let title = titleInput.value.trim();
            let seasonCount = parseInt(seasonInput.value) || 1;
            let phase = phaseSelect.value; 

            if (!title) return;
            if (seasonCount < 1) seasonCount = 1;

            let isUnreleased = false;
            if (title.endsWith('*')) {
                isUnreleased = true;
                title = title.slice(0, -1).trim();
            }

            await addDoc(moviesCol, {
                title: title,
                seasons: seasonCount,
                phase: phase,
                unreleased: isUnreleased,
                users: {} 
            });

            titleInput.value = '';
            seasonInput.value = '';
            phaseSelect.value = '0';

            document.getElementById('addModal').style.display = 'none';
        });

        const enterHandler = (e) => { if (e.key === 'Enter') document.getElementById('addBtn').click(); };
        document.getElementById('movieInput').addEventListener('keypress', enterHandler);
        document.getElementById('seasonInput').addEventListener('keypress', enterHandler);

        window.deleteProject = async function(movieId) {
            if (confirm("Точно удалить этот проект из глобальной базы?")) {
                const movieRef = doc(db, "marvel_projects", movieId);
                await deleteDoc(movieRef);
            }
        }
        
    </script>
</body>
</html>
