<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARVEL Tracker v2.0</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Roboto:wght@400;500&display=swap');

        :root {
            --marvel-red: #EC1D24;
            --bg-dark: #151515;
            --panel-bg: #222222;
            --text-main: #FFFFFF;
            --text-muted: #888888;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
            background-image: radial-gradient(circle at top center, #2a2a2a 0%, #151515 70%);
        }

        .logo {
            font-family: 'Oswald', sans-serif;
            background-color: var(--marvel-red);
            color: var(--text-main);
            font-size: 4rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: -2px;
            padding: 5px 20px;
            margin-bottom: 40px;
            box-shadow: 0 5px 20px rgba(236, 29, 36, 0.4);
            line-height: 1;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            background: var(--panel-bg);
            border-radius: 8px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            overflow: hidden;
            border: 1px solid #333;
        }

        /* Обновленная панель управления */
        .controls {
            display: flex;
            padding: 20px;
            gap: 12px;
            background: #1a1a1a;
            border-bottom: 3px solid var(--marvel-red);
            flex-wrap: wrap;
        }

        .controls input {
            padding: 12px;
            border: 2px solid #333;
            border-radius: 4px;
            background: #111;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        #movieInput { flex-grow: 2; min-width: 250px; }
        #seasonInput { width: 100px; text-align: center; }

        .controls input:focus { border-color: var(--marvel-red); }

        .controls button {
            font-family: 'Oswald', sans-serif;
            background-color: var(--marvel-red);
            color: white;
            border: none;
            padding: 0 25px;
            font-size: 1.1rem;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 4px;
            transition: background 0.2s, transform 0.1s;
        }

        .controls button:hover { background-color: #ff2a31; }
        .controls button:active { transform: scale(0.97); }

        .table-wrapper { max-height: 65vh; overflow-y: auto; }
        .table-wrapper::-webkit-scrollbar { width: 8px; }
        .table-wrapper::-webkit-scrollbar-thumb { background: var(--marvel-red); border-radius: 4px; }

        .movie-table { width: 100%; border-collapse: collapse; }
        .movie-table th {
            font-family: 'Oswald', sans-serif;
            text-transform: uppercase;
            background: #111;
            color: var(--text-muted);
            padding: 15px;
            text-align: left;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .movie-table td {
            padding: 12px 15px;
            border-bottom: 1px solid #2a2a2a;
            vertical-align: middle;
        }

        /* Контейнер для чекбоксов сезонов */
        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }

        .season-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .season-label {
            font-size: 0.65rem;
            color: var(--text-muted);
            font-weight: bold;
        }

        /* Кастомный чекбокс */
        .checkbox-container {
            position: relative;
            cursor: pointer;
            width: 24px;
            height: 24px;
        }

        .checkbox-container input {
            position: absolute;
            opacity: 0;
            width: 0; height: 0;
        }

        .checkmark {
            position: absolute;
            top: 0; left: 0;
            height: 24px; width: 24px;
            background-color: #111;
            border-radius: 4px;
            border: 2px solid #555;
            transition: 0.2s;
        }

        .checkbox-container:hover input ~ .checkmark { border-color: var(--marvel-red); }
        .checkbox-container input:checked ~ .checkmark {
            background-color: var(--marvel-red);
            border-color: var(--marvel-red);
        }

        .checkmark:after {
            content: "";
            position: absolute;
            display: none;
            left: 7px; top: 3px;
            width: 5px; height: 10px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }

        .checkbox-container input:checked ~ .checkmark:after { display: block; }

        .unreleased-tag {
            color: var(--marvel-red);
            font-size: 0.7rem;
            border: 1px solid var(--marvel-red);
            padding: 2px 6px;
            border-radius: 3px;
            margin-left: 10px;
            text-transform: uppercase;
        }

        .movie-title { font-size: 1.1rem; font-weight: 500; }
        .all-watched { color: var(--text-muted); text-decoration: line-through; }
    </style>
</head>
<body>

    <div class="logo">MARVEL</div>

    <div class="container">
        <div class="controls">
            <input type="text" id="movieInput" placeholder="Название фильма/сериала (звездочка '*' = не вышел)">
            <input type="number" id="seasonInput" min="1" placeholder="Сезоны" title="Кол-во сезонов (по умолчанию 1)">
            <button onclick="addMovie()">Добавить</button>
        </div>

        <div class="table-wrapper">
            <table class="movie-table">
                <thead>
                    <tr>
                        <th style="width: 50%;">Проект</th>
                        <th>Прогресс</th>
                    </tr>
                </thead>
                <tbody id="movieTableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        // Изначальный список с поддержкой сезонов
        const initialMovies = [
            { title: "Ванда/Вижн", seasons: 1, watched: [false], unreleased: false },
            { title: "Локи", seasons: 2, watched: [false, false], unreleased: false },
            { title: "Сорвиголова: Рожденный заново", seasons: 1, watched: [false], unreleased: true },
            { title: "Мстители: Финал", seasons: 1, watched: [false], unreleased: false }
        ];

        let movies = JSON.parse(localStorage.getItem('marvelTracker_v2'));
        if (!movies) {
            movies = initialMovies;
            save();
        }

        function save() {
            localStorage.setItem('marvelTracker_v2', JSON.stringify(movies));
        }

        function render() {
            const tbody = document.getElementById('movieTableBody');
            tbody.innerHTML = '';

            // Сортировка по алфавиту
            movies.sort((a, b) => a.title.localeCompare(b.title, 'ru'));

            movies.forEach((movie, mIdx) => {
                const tr = document.createElement('tr');
                const isFullyWatched = movie.watched.every(s => s === true);
                
                let progressHtml = `<div class="checkbox-group">`;
                
                for (let i = 0; i < movie.seasons; i++) {
                    const isWatched = movie.watched[i];
                    // Если сезонов больше 1, добавляем подпись S1, S2...
                    const label = movie.seasons > 1 ? `<span class="season-label">S${i+1}</span>` : '';
                    
                    progressHtml += `
                        <div class="season-item">
                            ${label}
                            <label class="checkbox-container">
                                <input type="checkbox" ${isWatched ? 'checked' : ''} 
                                       onchange="toggleSeason(${mIdx}, ${i})">
                                <span class="checkmark"></span>
                            </label>
                        </div>
                    `;
                }
                progressHtml += `</div>`;

                tr.innerHTML = `
                    <td>
                        <span class="movie-title ${isFullyWatched ? 'all-watched' : ''}">${movie.title}</span>
                        ${movie.unreleased ? '<span class="unreleased-tag">Ожидается</span>' : ''}
                    </td>
                    <td>${progressHtml}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function toggleSeason(movieIdx, seasonIdx) {
            movies[movieIdx].watched[seasonIdx] = !movies[movieIdx].watched[seasonIdx];
            save();
            render();
        }

        function addMovie() {
            const titleInput = document.getElementById('movieInput');
            const seasonInput = document.getElementById('seasonInput');
            
            let title = titleInput.value.trim();
            let seasonCount = parseInt(seasonInput.value) || 1;

            if (!title) return;

            let isUnreleased = false;
            if (title.endsWith('*')) {
                isUnreleased = true;
                title = title.slice(0, -1).trim();
            }

            // Создаем массив статусов для сезонов, заполненный false
            const watchedArray = new Array(seasonCount).fill(false);

            movies.push({
                title: title,
                seasons: seasonCount,
                watched: watchedArray,
                unreleased: isUnreleased
            });

            titleInput.value = '';
            seasonInput.value = '';
            save();
            render();
        }

        // Поддержка Enter
        document.getElementById('movieInput').onkeypress = (e) => e.key === 'Enter' && addMovie();
        document.getElementById('seasonInput').onkeypress = (e) => e.key === 'Enter' && addMovie();

        render();
    </script>
</body>
</html>
