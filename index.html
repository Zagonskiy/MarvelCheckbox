<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARVEL Tracker v3.0</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Roboto:wght@400;500&display=swap');

        :root {
            --marvel-red: #EC1D24;
            --bg-dark: #151515;
            --panel-bg: #222222;
            --text-main: #FFFFFF;
            --text-muted: #888888;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
            background-image: radial-gradient(circle at top center, #2a2a2a 0%, #151515 70%);
        }

        .logo {
            font-family: 'Oswald', sans-serif;
            background-color: var(--marvel-red);
            color: var(--text-main);
            font-size: 4rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: -2px;
            padding: 5px 20px;
            margin-bottom: 40px;
            box-shadow: 0 5px 20px rgba(236, 29, 36, 0.4);
            line-height: 1;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            background: var(--panel-bg);
            border-radius: 8px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            overflow: hidden;
            border: 1px solid #333;
        }

        /* Исправленная панель добавления (адаптивная) */
        .controls {
            display: flex;
            padding: 20px;
            gap: 15px;
            background: #1a1a1a;
            border-bottom: 3px solid var(--marvel-red);
            flex-wrap: wrap;
            align-items: center;
        }

        .controls input {
            padding: 15px;
            border: 2px solid #333;
            border-radius: 4px;
            background: #111;
            color: white;
            font-size: 1.1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        /* Позволяем полю с названием занимать максимум доступного места */
        #movieInput {
            flex: 1 1 300px; 
        }

        /* Поле для сезонов фиксируем, но позволяем переноситься */
        #seasonInput {
            flex: 0 1 120px;
            text-align: center;
        }

        .controls input:focus {
            border-color: var(--marvel-red);
        }

        .controls button {
            font-family: 'Oswald', sans-serif;
            background-color: var(--marvel-red);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 4px;
            transition: background 0.2s, transform 0.1s;
            flex: 0 1 auto;
        }

        .controls button:hover {
            background-color: #ff2a31;
        }

        .controls button:active {
            transform: scale(0.97);
        }

        /* Таблица фильмов */
        .table-wrapper {
            max-height: 65vh;
            overflow-y: auto;
        }

        .table-wrapper::-webkit-scrollbar {
            width: 10px;
        }

        .table-wrapper::-webkit-scrollbar-track {
            background: #1a1a1a;
        }

        .table-wrapper::-webkit-scrollbar-thumb {
            background: var(--marvel-red);
            border-radius: 5px;
        }

        .movie-table {
            width: 100%;
            border-collapse: collapse;
        }

        .movie-table th {
            font-family: 'Oswald', sans-serif;
            text-transform: uppercase;
            background: #111;
            color: var(--text-muted);
            padding: 15px 20px;
            text-align: left;
            font-size: 1.2rem;
            letter-spacing: 1px;
            position: sticky;
            top: 0;
            z-index: 10;
            border-bottom: 1px solid #333;
        }

        .movie-table td {
            padding: 15px 20px;
            border-bottom: 1px solid #2a2a2a;
            transition: all 0.3s;
            vertical-align: middle;
        }

        .movie-table tr:hover td {
            background: rgba(236, 29, 36, 0.05);
        }

        /* Контейнер для чекбоксов (сезонов) */
        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
        }

        .season-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .season-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            font-weight: bold;
            font-family: 'Oswald', sans-serif;
        }

        /* Кастомный чекбокс */
        .checkbox-container {
            display: inline-block;
            position: relative;
            cursor: pointer;
            width: 28px;
            height: 28px;
            user-select: none;
        }

        .checkbox-container input {
            position: absolute;
            opacity: 0;
            cursor: pointer;
            height: 0;
            width: 0;
        }

        .checkmark {
            position: absolute;
            top: 0;
            left: 0;
            height: 28px;
            width: 28px;
            background-color: #111;
            border-radius: 4px;
            border: 2px solid #555;
            transition: all 0.2s;
        }

        .checkbox-container:hover input ~ .checkmark {
            border-color: var(--marvel-red);
        }

        .checkbox-container input:checked ~ .checkmark {
            background-color: var(--marvel-red);
            border-color: var(--marvel-red);
        }

        .checkmark:after {
            content: "";
            position: absolute;
            display: none;
        }

        .checkbox-container input:checked ~ .checkmark:after {
            display: block;
        }

        .checkbox-container .checkmark:after {
            left: 9px;
            top: 4px;
            width: 6px;
            height: 12px;
            border: solid white;
            border-width: 0 3px 3px 0;
            transform: rotate(45deg);
        }

        .unreleased-tag {
            display: inline-block;
            color: var(--marvel-red);
            font-size: 0.75rem;
            text-transform: uppercase;
            margin-left: 12px;
            font-weight: bold;
            border: 1px solid var(--marvel-red);
            padding: 3px 8px;
            border-radius: 3px;
            vertical-align: middle;
        }

        .movie-title {
            font-size: 1.1rem;
            font-weight: 500;
        }

        .all-watched {
            color: var(--text-muted);
            text-decoration: line-through;
            text-decoration-color: #555;
        }

        /* Адаптивность для мобильных экранов */
        @media (max-width: 600px) {
            .controls {
                flex-direction: column;
                align-items: stretch;
            }
            #movieInput, #seasonInput, .controls button {
                flex: 1 1 100%;
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="logo">MARVEL</div>

    <div class="container">
        <div class="controls">
            <input type="text" id="movieInput" placeholder="Введите название (добавьте '*' если не вышел)...">
            <input type="number" id="seasonInput" min="1" placeholder="Сезоны" title="Количество сезонов">
            <button onclick="addMovie()">Добавить</button>
        </div>

        <div class="table-wrapper">
            <table class="movie-table">
                <thead>
                    <tr>
                        <th style="width: 55%;">Название проекта</th>
                        <th>Прогресс (сезоны)</th>
                    </tr>
                </thead>
                <tbody id="movieTableBody">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        // Полная база всех проектов с учетом структуры сезонов
        const fullMarvelDatabase = [
            { title: "Блэйд", seasons: 1, watched: [false], unreleased: true },
            { title: "Вечные", seasons: 1, watched: [false], unreleased: false },
            { title: "Громовержцы*", seasons: 1, watched: [false], unreleased: true },
            { title: "Доктор Стрэндж", seasons: 1, watched: [false], unreleased: false },
            { title: "Доктор Стрэндж: В мультивселенной безумия", seasons: 1, watched: [false], unreleased: false },
            { title: "Дэдпул и Росомаха", seasons: 1, watched: [false], unreleased: false },
            { title: "Железный человек", seasons: 1, watched: [false], unreleased: false },
            { title: "Железный человек 2", seasons: 1, watched: [false], unreleased: false },
            { title: "Железный человек 3", seasons: 1, watched: [false], unreleased: false },
            { title: "Капитан Америка: Дивный новый мир", seasons: 1, watched: [false], unreleased: true },
            { title: "Капитан Марвел", seasons: 1, watched: [false], unreleased: false },
            { title: "Капитан Марвел 2 (Марвелы)", seasons: 1, watched: [false], unreleased: false },
            { title: "Мстители", seasons: 1, watched: [false], unreleased: false },
            { title: "Мстители: Война бесконечности", seasons: 1, watched: [false], unreleased: false },
            { title: "Мстители: Секретные войны", seasons: 1, watched: [false], unreleased: true },
            { title: "Мстители: Судный день", seasons: 1, watched: [false], unreleased: true },
            { title: "Мстители: Финал", seasons: 1, watched: [false], unreleased: false },
            { title: "Мстители: Эра Альтрона", seasons: 1, watched: [false], unreleased: false },
            { title: "Невероятный Халк", seasons: 1, watched: [false], unreleased: false },
            { title: "Первый мститель", seasons: 1, watched: [false], unreleased: false },
            { title: "Первый мститель: Другая война", seasons: 1, watched: [false], unreleased: false },
            { title: "Первый мститель: Противостояние", seasons: 1, watched: [false], unreleased: false },
            { title: "Стражи Галактики", seasons: 1, watched: [false], unreleased: false },
            { title: "Стражи Галактики. Часть 2", seasons: 1, watched: [false], unreleased: false },
            { title: "Стражи Галактики. Часть 3", seasons: 1, watched: [false], unreleased: false },
            { title: "Тор", seasons: 1, watched: [false], unreleased: false },
            { title: "Тор 2: Царство тьмы", seasons: 1, watched: [false], unreleased: false },
            { title: "Тор: Любовь и гром", seasons: 1, watched: [false], unreleased: false },
            { title: "Тор: Рагнарёк", seasons: 1, watched: [false], unreleased: false },
            { title: "Фантастическая четвёрка: Первые шаги", seasons: 1, watched: [false], unreleased: true },
            { title: "Человек-муравей", seasons: 1, watched: [false], unreleased: false },
            { title: "Человек-муравей и Оса", seasons: 1, watched: [false], unreleased: false },
            { title: "Человек-муравей и Оса: Квантомания", seasons: 1, watched: [false], unreleased: false },
            { title: "Человек-паук: Вдали от дома", seasons: 1, watched: [false], unreleased: false },
            { title: "Человек-паук: Возвращение домой", seasons: 1, watched: [false], unreleased: false },
            { title: "Человек-паук: Нет пути домой", seasons: 1, watched: [false], unreleased: false },
            { title: "Черная Вдова", seasons: 1, watched: [false], unreleased: false },
            { title: "Черная Пантера", seasons: 1, watched: [false], unreleased: false },
            { title: "Черная Пантера: Ваканда навеки", seasons: 1, watched: [false], unreleased: false },
            { title: "Шан-Чи и легенда десяти колец", seasons: 1, watched: [false], unreleased: false },
            // Популярные сериалы для полноты картины
            { title: "Ванда/Вижн", seasons: 1, watched: [false], unreleased: false },
            { title: "Локи", seasons: 2, watched: [false, false], unreleased: false },
            { title: "Сорвиголова: Рожденный заново", seasons: 1, watched: [false], unreleased: true }
        ];

        // Загрузка данных. Используем новый ключ v3, чтобы старые ошибки не мешали
        let movies = JSON.parse(localStorage.getItem('marvelTracker_v3'));
        if (!movies) {
            movies = fullMarvelDatabase;
            saveData();
        }

        function saveData() {
            localStorage.setItem('marvelTracker_v3', JSON.stringify(movies));
        }

        function renderTable() {
            const tbody = document.getElementById('movieTableBody');
            tbody.innerHTML = '';

            // Сортировка списка по алфавиту
            movies.sort((a, b) => a.title.localeCompare(b.title, 'ru'));

            movies.forEach((movie, movieIndex) => {
                const tr = document.createElement('tr');
                
                // Проверяем, просмотрены ли абсолютно все сезоны
                const isFullyWatched = movie.watched.every(season => season === true);
                
                let progressHtml = `<div class="checkbox-group">`;
                
                // Генерируем чекбоксы для каждого сезона
                for (let i = 0; i < movie.seasons; i++) {
                    const isWatched = movie.watched[i];
                    const labelHtml = movie.seasons > 1 ? `<span class="season-label">S${i+1}</span>` : '';
                    
                    progressHtml += `
                        <div class="season-item">
                            ${labelHtml}
                            <label class="checkbox-container">
                                <input type="checkbox" ${isWatched ? 'checked' : ''} 
                                       onchange="toggleSeasonStatus(${movieIndex}, ${i})">
                                <span class="checkmark"></span>
                            </label>
                        </div>
                    `;
                }
                progressHtml += `</div>`;

                // Плашка для невышедших
                const unreleasedHtml = movie.unreleased ? `<span class="unreleased-tag">Не вышел</span>` : '';

                tr.innerHTML = `
                    <td>
                        <span class="movie-title ${isFullyWatched ? 'all-watched' : ''}">
                            ${movie.title}
                        </span>
                        ${unreleasedHtml}
                    </td>
                    <td>${progressHtml}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function toggleSeasonStatus(movieIndex, seasonIndex) {
            movies[movieIndex].watched[seasonIndex] = !movies[movieIndex].watched[seasonIndex];
            saveData();
            renderTable(); // Перерисовываем таблицу, чтобы обновить зачеркивание текста
        }

        function addMovie() {
            const titleInput = document.getElementById('movieInput');
            const seasonInput = document.getElementById('seasonInput');
            
            let title = titleInput.value.trim();
            // Если поле пустое или введено некорректное значение, ставим 1 сезон
            let seasonCount = parseInt(seasonInput.value) || 1;
            if (seasonCount < 1) seasonCount = 1;

            if (title === '') return;

            let isUnreleased = false;
            if (title.endsWith('*')) {
                isUnreleased = true;
                title = title.slice(0, -1).trim();
            }

            // Проверка на дубликаты
            if (movies.some(m => m.title.toLowerCase() === title.toLowerCase())) {
                alert('Этот проект уже есть в списке!');
                return;
            }

            // Создаем массив чекбоксов под количество сезонов
            const watchedArray = new Array(seasonCount).fill(false);

            movies.push({
                title: title,
                seasons: seasonCount,
                watched: watchedArray,
                unreleased: isUnreleased
            });

            // Очищаем поля ввода
            titleInput.value = '';
            seasonInput.value = '';
            
            saveData();
            renderTable();
        }

        // Обработка нажатия клавиши Enter в полях ввода
        document.getElementById('movieInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') addMovie();
        });
        document.getElementById('seasonInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') addMovie();
        });

        // Первичный рендер при загрузке страницы
        renderTable();
    </script>
</body>
</html>
