<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARVEL Tracker</title>
    <style>
        /* Подключаем стильные шрифты для заголовков и текста */
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Roboto:wght@400;500&display=swap');

        :root {
            --marvel-red: #EC1D24;
            --bg-dark: #151515;
            --panel-bg: #222222;
            --text-main: #FFFFFF;
            --text-muted: #888888;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
            /* Легкий радиальный градиент для глубины фона */
            background-image: radial-gradient(circle at top center, #2a2a2a 0%, #151515 70%);
        }

        /* Стиль логотипа Marvel */
        .logo {
            font-family: 'Oswald', sans-serif;
            background-color: var(--marvel-red);
            color: var(--text-main);
            font-size: 4rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: -2px;
            padding: 5px 20px;
            margin-bottom: 40px;
            box-shadow: 0 5px 20px rgba(236, 29, 36, 0.4);
            line-height: 1;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: var(--panel-bg);
            border-radius: 8px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            overflow: hidden;
            border: 1px solid #333;
        }

        /* Панель добавления нового фильма */
        .controls {
            display: flex;
            padding: 20px;
            gap: 15px;
            background: #1a1a1a;
            border-bottom: 3px solid var(--marvel-red);
        }

        .controls input[type="text"] {
            flex-grow: 1;
            padding: 15px;
            border: 2px solid #333;
            border-radius: 4px;
            background: #111;
            color: white;
            font-size: 1.1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .controls input[type="text"]:focus {
            border-color: var(--marvel-red);
        }

        .controls button {
            font-family: 'Oswald', sans-serif;
            background-color: var(--marvel-red);
            color: white;
            border: none;
            padding: 0 30px;
            font-size: 1.2rem;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 4px;
            transition: background 0.2s, transform 0.1s;
        }

        .controls button:hover {
            background-color: #ff2a31;
        }

        .controls button:active {
            transform: scale(0.97);
        }

        /* Таблица фильмов */
        .table-wrapper {
            max-height: 60vh;
            overflow-y: auto;
        }

        /* Кастомизация скроллбара */
        .table-wrapper::-webkit-scrollbar { width: 10px; }
        .table-wrapper::-webkit-scrollbar-track { background: #1a1a1a; }
        .table-wrapper::-webkit-scrollbar-thumb { background: var(--marvel-red); border-radius: 5px; }

        .movie-table {
            width: 100%;
            border-collapse: collapse;
        }

        .movie-table th {
            font-family: 'Oswald', sans-serif;
            text-transform: uppercase;
            background: #111;
            color: var(--text-muted);
            padding: 15px 20px;
            text-align: left;
            font-size: 1.2rem;
            letter-spacing: 1px;
            position: sticky;
            top: 0;
            z-index: 10;
            border-bottom: 1px solid #333;
        }

        .movie-table th.center {
            text-align: center;
            width: 150px;
        }

        .movie-table td {
            padding: 15px 20px;
            border-bottom: 1px solid #2a2a2a;
            font-size: 1.1rem;
            transition: all 0.3s;
        }

        .movie-table tr:hover td {
            background: rgba(236, 29, 36, 0.05);
        }

        .movie-table td.center {
            text-align: center;
        }

        .unreleased-tag {
            display: inline-block;
            color: var(--marvel-red);
            font-size: 0.75rem;
            text-transform: uppercase;
            margin-left: 12px;
            font-weight: bold;
            border: 1px solid var(--marvel-red);
            padding: 3px 8px;
            border-radius: 3px;
            vertical-align: middle;
        }

        /* Стиль просмотренного фильма */
        .row-watched .title-cell {
            color: var(--text-muted);
            text-decoration: line-through;
            text-decoration-color: #555;
        }

        /* Кастомный чекбокс */
        .checkbox-container {
            display: inline-block;
            position: relative;
            cursor: pointer;
            width: 28px;
            height: 28px;
            user-select: none;
        }

        .checkbox-container input {
            position: absolute;
            opacity: 0;
            cursor: pointer;
            height: 0;
            width: 0;
        }

        .checkmark {
            position: absolute;
            top: 0;
            left: 0;
            height: 28px;
            width: 28px;
            background-color: #111;
            border-radius: 4px;
            border: 2px solid #555;
            transition: all 0.2s;
        }

        .checkbox-container:hover input ~ .checkmark {
            border-color: var(--marvel-red);
        }

        .checkbox-container input:checked ~ .checkmark {
            background-color: var(--marvel-red);
            border-color: var(--marvel-red);
        }

        .checkmark:after {
            content: "";
            position: absolute;
            display: none;
        }

        .checkbox-container input:checked ~ .checkmark:after {
            display: block;
        }

        .checkbox-container .checkmark:after {
            left: 9px;
            top: 4px;
            width: 6px;
            height: 12px;
            border: solid white;
            border-width: 0 3px 3px 0;
            transform: rotate(45deg);
        }
    </style>
</head>
<body>

    <div class="logo">MARVEL</div>

    <div class="container">
        <div class="controls">
            <input type="text" id="movieInput" placeholder="Введите название фильма (добавьте '*' в конце, если он не вышел)...">
            <button onclick="addMovie()">Добавить</button>
        </div>

        <div class="table-wrapper">
            <table class="movie-table">
                <thead>
                    <tr>
                        <th>Название фильма</th>
                        <th class="center">Просмотрено</th>
                    </tr>
                </thead>
                <tbody id="movieTableBody">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        // Базовый список КВМ и других фильмов (включая будущие релизы)
        const defaultMovies = [
            { title: "Блэйд", watched: false, unreleased: true },
            { title: "Вечные", watched: false, unreleased: false },
            { title: "Громовержцы*", watched: false, unreleased: true },
            { title: "Доктор Стрэндж", watched: false, unreleased: false },
            { title: "Доктор Стрэндж: В мультивселенной безумия", watched: false, unreleased: false },
            { title: "Дэдпул и Росомаха", watched: false, unreleased: false },
            { title: "Железный человек", watched: false, unreleased: false },
            { title: "Железный человек 2", watched: false, unreleased: false },
            { title: "Железный человек 3", watched: false, unreleased: false },
            { title: "Капитан Америка: Дивный новый мир", watched: false, unreleased: true },
            { title: "Капитан Марвел", watched: false, unreleased: false },
            { title: "Капитан Марвел 2 (Марвелы)", watched: false, unreleased: false },
            { title: "Мстители", watched: false, unreleased: false },
            { title: "Мстители: Война бесконечности", watched: false, unreleased: false },
            { title: "Мстители: Секретные войны", watched: false, unreleased: true },
            { title: "Мстители: Судный день", watched: false, unreleased: true },
            { title: "Мстители: Финал", watched: false, unreleased: false },
            { title: "Мстители: Эра Альтрона", watched: false, unreleased: false },
            { title: "Невероятный Халк", watched: false, unreleased: false },
            { title: "Первый мститель", watched: false, unreleased: false },
            { title: "Первый мститель: Другая война", watched: false, unreleased: false },
            { title: "Первый мститель: Противостояние", watched: false, unreleased: false },
            { title: "Стражи Галактики", watched: false, unreleased: false },
            { title: "Стражи Галактики. Часть 2", watched: false, unreleased: false },
            { title: "Стражи Галактики. Часть 3", watched: false, unreleased: false },
            { title: "Тор", watched: false, unreleased: false },
            { title: "Тор 2: Царство тьмы", watched: false, unreleased: false },
            { title: "Тор: Любовь и гром", watched: false, unreleased: false },
            { title: "Тор: Рагнарёк", watched: false, unreleased: false },
            { title: "Фантастическая четвёрка: Первые шаги", watched: false, unreleased: true },
            { title: "Человек-муравей", watched: false, unreleased: false },
            { title: "Человек-муравей и Оса", watched: false, unreleased: false },
            { title: "Человек-муравей и Оса: Квантомания", watched: false, unreleased: false },
            { title: "Человек-паук: Вдали от дома", watched: false, unreleased: false },
            { title: "Человек-паук: Возвращение домой", watched: false, unreleased: false },
            { title: "Человек-паук: Нет пути домой", watched: false, unreleased: false },
            { title: "Черная Вдова", watched: false, unreleased: false },
            { title: "Черная Пантера", watched: false, unreleased: false },
            { title: "Черная Пантера: Ваканда навеки", watched: false, unreleased: false },
            { title: "Шан-Чи и легенда десяти колец", watched: false, unreleased: false }
        ];

        // Загрузка данных из localStorage или использование дефолтных
        let movies = JSON.parse(localStorage.getItem('marvelMovies'));
        if (!movies) {
            movies = defaultMovies;
            saveData();
        }

        function saveData() {
            localStorage.setItem('marvelMovies', JSON.stringify(movies));
        }

        function renderTable() {
            const tbody = document.getElementById('movieTableBody');
            tbody.innerHTML = '';

            // Сортировка по алфавиту
            movies.sort((a, b) => a.title.localeCompare(b.title, 'ru'));

            movies.forEach((movie, index) => {
                const tr = document.createElement('tr');
                if (movie.watched) tr.classList.add('row-watched');

                const unreleasedHtml = movie.unreleased ? `<span class="unreleased-tag">Не вышел</span>` : '';

                tr.innerHTML = `
                    <td class="title-cell">
                        ${movie.title} ${unreleasedHtml}
                    </td>
                    <td class="center">
                        <label class="checkbox-container">
                            <input type="checkbox" ${movie.watched ? 'checked' : ''} onchange="toggleWatched(${index})">
                            <span class="checkmark"></span>
                        </label>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function toggleWatched(index) {
            movies[index].watched = !movies[index].watched;
            saveData();
            renderTable();
        }

        function addMovie() {
            const input = document.getElementById('movieInput');
            let title = input.value.trim();
            
            if (title === '') return;

            // Если пользователь ставит звездочку в конце, помечаем как невышедший
            let isUnreleased = false;
            if (title.endsWith('*')) {
                isUnreleased = true;
                title = title.slice(0, -1).trim(); // убираем звездочку из названия
            }

            // Проверка на дубликаты
            if (movies.some(m => m.title.toLowerCase() === title.toLowerCase())) {
                alert('Этот фильм уже есть в списке!');
                return;
            }

            movies.push({
                title: title,
                watched: false,
                unreleased: isUnreleased
            });

            input.value = '';
            saveData();
            renderTable();
        }

        // Обработка нажатия Enter в поле ввода
        document.getElementById('movieInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                addMovie();
            }
        });

        // Первичный рендер при загрузке страницы
        renderTable();
    </script>
</body>
</html>
